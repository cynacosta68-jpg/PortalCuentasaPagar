<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Portal de Cuentas a Pagar</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">CP</div>
      <div>
        <div class="login-title">Portal de Cuentas a Pagar</div>
        <div class="login-subtitle">Acceso restringido</div>
      </div>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-control"
               placeholder="Ingresá la contraseña del portal" autofocus required>
      </div>
      <div id="login-alert"></div>
      <button type="submit" class="btn btn-primary" id="btn-ingresar" style="width:100%; margin-top:6px">
        Ingresar
      </button>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
