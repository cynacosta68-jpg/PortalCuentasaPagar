<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — Portal de Cuentas a Pagar</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="sidebar">
    <div class="brand">
      <div class="brand-icon">CP</div>
      <span class="brand-name">Cuentas<br>a Pagar</span>
    </div>
    <ul class="nav-list">
      <li><a href="/" class="nav-link">⬛ Panel</a></li>
      <li><a href="/proveedores.html" class="nav-link">👥 Proveedores</a></li>
      <li><a href="/egresos.html" class="nav-link">📄 Egresos</a></li>
      <li><a href="/pagos.html" class="nav-link">💸 Pagos</a></li>
      <li><a href="/seguimiento.html" class="nav-link">📊 Seguimiento</a></li>
      <li><a href="/consultas.html" class="nav-link">💬 Consultas</a></li>
      <li><a href="/descargas.html" class="nav-link">⬇ Descargas</a></li>
    </ul>
  </nav>

  <main class="content">
    <header class="topbar">
      <h1 class="page-title">Usuarios</h1>
    </header>

    <div class="page-actions">
      <button class="btn btn-primary" id="btn-nuevo">+ Nuevo usuario</button>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th>
            <th>Estado</th><th>Último acceso</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody-usuarios"></tbody>
      </table>
    </div>
  </main>

  <!-- Modal: alta/edición -->
  <div class="modal-overlay hidden" id="modal-usuario">
    <div class="modal" style="width:min(520px,96vw)">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-titulo">Nuevo usuario</h2>
        <button class="modal-close" onclick="document.getElementById('modal-usuario').classList.add('hidden')">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre y apellido *</label>
          <input type="text" id="u-nombre" class="form-control">
        </div>
        <div class="form-group">
          <label>Usuario *</label>
          <input type="text" id="u-usuario" class="form-control" autocapitalize="none">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="u-email" class="form-control">
        </div>
        <div class="form-group">
          <label>Rol *</label>
          <select id="u-rol" class="form-control">
            <option value="gerencia">Gerencia</option>
            <option value="coordinacion">Coordinación</option>
            <option value="analista">Analista Contable</option>
            <option value="auditor">Auditor</option>
          </select>
        </div>
        <div class="form-group" id="grupo-password" style="grid-column:span 2">
          <label>Contraseña inicial *</label>
          <input type="text" id="u-password" class="form-control" placeholder="Mínimo 8 caracteres — el usuario la cambia al ingresar">
        </div>
      </div>
      <div id="usuario-alert"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('modal-usuario').classList.add('hidden')">Cancelar</button>
        <button class="btn btn-primary" id="btn-guardar-usuario">Guardar</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/usuarios.js"></script>
</body>
</html>
