<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar contraseña — Portal de Cuentas a Pagar</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">CP</div>
      <div>
        <div class="login-title">Cambiar contraseña</div>
        <div class="login-subtitle" id="sub">Definí tu contraseña personal</div>
      </div>
    </div>

    <form id="cp-form" autocomplete="off">
      <div class="form-group" id="grupo-actual" style="display:none">
        <label for="actual">Contraseña actual</label>
        <input type="password" id="actual" class="form-control" placeholder="Tu contraseña actual">
      </div>
      <div class="form-group">
        <label for="nueva">Nueva contraseña</label>
        <input type="password" id="nueva" class="form-control" placeholder="Mínimo 8 caracteres" autofocus required>
      </div>
      <div class="form-group">
        <label for="confirmar">Repetir nueva contraseña</label>
        <input type="password" id="confirmar" class="form-control" placeholder="Repetila" required>
      </div>
      <div id="cp-alert"></div>
      <button type="submit" class="btn btn-primary" id="btn-cp" style="width:100%; margin-top:6px">
        Guardar contraseña
      </button>
    </form>
  </div>

  <script src="/js/cambiar-password.js"></script>
</body>
</html>
